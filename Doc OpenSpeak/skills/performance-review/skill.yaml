name: performance-review
version: 1.0.0
description: >
  Reviews app responsiveness, SwiftUI rendering efficiency, memory usage,
  scrolling quality, launch performance, concurrency, battery impact and scalability.
category:
  - engineering
  - performance
  - ios
tags:
  - performance
  - swiftui
  - rendering
  - memory
  - battery
  - launch-time
  - scrolling
  - concurrency
  - cloudkit
  - persistence
inputs:
  required:
    - product_context
  optional:
    - source_code
    - instruments_traces
    - performance_measurements
    - memory_reports
    - crash_reports
    - screen_recordings
    - persistence_strategy
    - sync_strategy
    - widget_architecture
    - previous_audits
outputs:
  - executive_summary
  - evidence_notes
  - confidence_notes
  - scores
  - performance_risks
  - rendering_findings
  - memory_findings
  - battery_findings
  - sync_persistence_analysis
  - observed_issues
  - strategic_recommendations
  - recommended_next_iteration
  - open_questions
language: es-ES
evidence_required: true
confidence_required: true
separate_observations_from_recommendations: true
do_not_invent_missing_information: true
severity_levels:
  - critical
  - high
  - medium
  - low
depends_on:
  - ../README.md
prompt: prompt.md
