name: wcag-review
version: 1.0.0
description: >
  Reviews WCAG alignment and Apple accessibility quality, including Dynamic Type,
  VoiceOver, contrast, touch targets, Reduce Motion and cognitive accessibility.
category:
  - accessibility
  - ux
  - compliance
tags:
  - wcag
  - accessibility
  - voiceover
  - dynamic-type
  - contrast
  - reduce-motion
  - touch-targets
  - inclusive-design
inputs:
  required:
    - product_context
  optional:
    - screenshots
    - screen_recordings
    - swiftui_views
    - accessibility_labels
    - voiceover_recordings
    - dynamic_type_screenshots
    - color_palette
    - typography_system
    - previous_audits
outputs:
  - executive_summary
  - evidence_notes
  - confidence_notes
  - scores
  - accessibility_barriers
  - voiceover_findings
  - dynamic_type_findings
  - contrast_findings
  - motion_findings
  - observed_issues
  - strategic_recommendations
  - recommended_next_iteration
  - open_questions
language: es-ES
evidence_required: true
confidence_required: true
separate_observations_from_recommendations: true
do_not_invent_missing_information: true
severity_levels:
  - critical
  - high
  - medium
  - low
depends_on:
  - ../README.md
prompt: prompt.md
