name: architecture-review
version: 1.0.0
description: >
  Reviews the technical architecture, maintainability, resilience,
  scalability, state management, offline-first behavior and long-term evolvability.
category:
  - architecture
  - engineering
  - code-quality
tags:
  - swiftui
  - architecture
  - maintainability
  - local-first
  - cloudkit
  - sync
  - resilience
  - testing
  - security
  - performance
inputs:
  required:
    - product_context
  optional:
    - source_code
    - project_structure
    - dependency_graph
    - architecture_docs
    - openspec_docs
    - persistence_strategy
    - cloudkit_strategy
    - testing_strategy
    - ci_cd_config
    - previous_audits
outputs:
  - executive_summary
  - evidence_notes
  - confidence_notes
  - scores
  - architectural_risks
  - complexity_analysis
  - maintainability_findings
  - resilience_findings
  - security_findings
  - observed_issues
  - strategic_recommendations
  - recommended_next_iteration
  - open_questions
language: es-ES
evidence_required: true
confidence_required: true
separate_observations_from_recommendations: true
do_not_invent_missing_information: true
severity_levels:
  - critical
  - high
  - medium
  - low
depends_on:
  - ../README.md
prompt: prompt.md
