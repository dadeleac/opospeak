name: executive-product-review
version: 1.0.0
description: >
  Synthesizes specialized audits into an executive product assessment focused
  on strategic coherence, product identity, quality, sustainability and priority decisions.
category:
  - product
  - strategy
  - governance
tags:
  - executive-review
  - product-strategy
  - product-governance
  - coherence
  - prioritization
  - product-identity
  - sustainability
  - roadmap
inputs:
  required:
    - product_context
    - previous_audits
  optional:
    - openspec_docs
    - product_philosophy
    - roadmap
    - screenshots
    - testflight_feedback
    - monetization_strategy
    - app_store_assets
    - architecture_summary
    - known_limitations
outputs:
  - executive_summary
  - evidence_notes
  - confidence_notes
  - scores
  - strategic_risks
  - product_identity_analysis
  - product_quality_assessment
  - sustainability_findings
  - product_drift_risks
  - highest_leverage_improvements
  - recommended_next_iteration
  - open_questions
language: es-ES
evidence_required: true
confidence_required: true
separate_observations_from_recommendations: true
do_not_invent_missing_information: true
severity_levels:
  - critical
  - high
  - medium
  - low
depends_on:
  - ../README.md
prompt: prompt.md
