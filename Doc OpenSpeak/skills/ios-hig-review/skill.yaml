name: ios-hig-review
version: 1.0.0
description: >
  Reviews the application against Apple Human Interface Guidelines,
  native iOS UX expectations, interaction quality and platform authenticity.
category:
  - ux
  - ios
  - design
tags:
  - apple-hig
  - swiftui
  - native-ios
  - navigation
  - interaction-design
  - visual-polish
  - accessibility
inputs:
  required:
    - product_context
  optional:
    - screenshots
    - screen_recordings
    - swiftui_views
    - navigation_flows
    - openspec_docs
    - design_system
    - accessibility_settings
    - previous_audits
outputs:
  - executive_summary
  - evidence_notes
  - confidence_notes
  - scores
  - hig_findings
  - accessibility_findings
  - premium_experience_gaps
  - observed_issues
  - strategic_recommendations
  - recommended_next_iteration
  - open_questions
language: es-ES
evidence_required: true
confidence_required: true
separate_observations_from_recommendations: true
do_not_invent_missing_information: true
severity_levels:
  - critical
  - high
  - medium
  - low
depends_on:
  - ../README.md
prompt: prompt.md
